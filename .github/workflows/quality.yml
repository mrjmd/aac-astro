name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate JSON-LD schemas
        run: npm run validate:schema

      - name: Check images
        run: npm run check:images

      - name: Check SEO metadata
        run: npm run check:seo

      - name: Check accessibility
        run: npm run check:a11y

      - name: Validate internal links
        run: npm run validate:links

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Note: Deployment handled by Vercel's GitHub integration directly
  # No need for manual deploy step - Vercel auto-deploys on push to main

<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#fcfcfc" />
  <grid stroke="#eee" stroke-width="1" />
  
  <!-- Axes -->
  <line x1="50" y1="350" x2="750" y2="350" stroke="#333" stroke-width="2" /> <!-- X-Axis -->
  <line x1="50" y1="50" x2="50" y2="350" stroke="#333" stroke-width="2" />  <!-- Y-Axis -->

  <!-- Y-Axis Labels (Traffic) -->
  <text x="40" y="350" text-anchor="end" font-family="sans-serif" font-size="12" fill="#666">0</text>
  <text x="40" y="250" text-anchor="end" font-family="sans-serif" font-size="12" fill="#666">200</text>
  <text x="40" y="150" text-anchor="end" font-family="sans-serif" font-size="12" fill="#666">400</text>
  <text x="40" y="50" text-anchor="end" font-family="sans-serif" font-size="12" fill="#666">600</text>
  <text x="10" y="200" transform="rotate(-90 10,200)" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Organic Traffic</text>

  <!-- X-Axis Labels (Time - Key Milestones) -->
  <text x="80" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">May '22</text>
  <text x="250" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Jan '23</text>
  <text x="420" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Apr '24</text>
  <text x="590" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Mar '25</text>
  <text x="750" y="370" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Mar '26</text>

  <!-- Data Line (Conceptual representation of the CSV data points) -->
  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="
    50,193 
    80,193 
    110,213 
    140,230 
    170,250 
    200,266 
    230,290 
    260,300 
    290,310 
    320,330 
    350,340 
    380,345 
    410,350 
    440,340 
    470,335 
    500,330 
    530,320 
    560,280 
    590,136 
    620,250 
    650,220 
    680,180 
    710,120 
    750,71
  " />

  <!-- Inflection Points / Callouts -->
  <!-- 1. WordPress Peak -->
  <circle cx="80" cy="193" r="5" fill="#ef4444" />
  <text x="85" y="180" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ef4444">Peak WordPress (316)</text>

  <!-- 2. The Slow Bleed -->
  <line x1="80" y1="193" x2="380" y2="345" stroke="#ef4444" stroke-width="1" stroke-dasharray="4" />
  <text x="200" y="250" transform="rotate(25 200,250)" font-family="sans-serif" font-size="10" fill="#ef4444">Technical Debt / EEAT Bleed</text>

  <!-- 3. Squarespace Cutover -->
  <circle cx="420" cy="350" r="5" fill="#333" />
  <text x="420" y="335" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Squarespace Move (93)</text>

  <!-- 4. 2025 Content Recovery -->
  <circle cx="590" cy="136" r="5" fill="#10b981" />
  <text x="595" y="130" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10b981">MA Content Surge (428)</text>

  <!-- 5. All-Time High -->
  <circle cx="750" cy="71" r="5" fill="#2563eb" />
  <text x="745" y="60" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2563eb">Current High (558)</text>

  <!-- Platform Shading -->
  <rect x="50" y="355" width="370" height="15" fill="#e5e7eb" opacity="0.5" />
  <text x="235" y="367" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">WordPress Era</text>
  
  <rect x="420" y="355" width="330" height="15" fill="#fde68a" opacity="0.5" />
  <text x="585" y="367" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#92400e">Squarespace Era</text>
</svg>
